<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    **Dashboard Card for System Health Metrics**
    <div class="Dashboard">
    <h1>System Health</h1>
    <table class="metrics-table">
        <thead>
            <tr>
                <th>CPU</th>
                <th>Memory</th>
                <th>Disk</th>
                <th>Last Update</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><span id="cpu" class="value">-</span><span class="unit">%</span></td>
                <td><span id="mem" class="value">-</span><span class="unit">%</span></td>
                <td><span id="disk" class="value">-</span><span class="unit">%</span></td>
                <td id="time" class="timestamp">--:--:--</td>
            </tr>
        </tbody>

        <div class="dashboard-card" style="margin-top: 20px;">
    <h2>Recent History</h2>
    <table class="metrics-table" id="historyTable">
        <thead>
            <tr>
                <th>Time</th>
                <th>CPU %</th>
                <th>Mem %</th>
                <th>Disk %</th>
            </tr>
        </thead>
        <tbody id="historyBody">
            </tbody>
    </table>
</div>

    <button id="refreshBtn" class="refresh-btn">Refresh Now</button>
</div>

<script src="logic.js"></script>


    
    
</body>
</html>
